name: release
# Tag a version (v1.x.y) → tests run, the universal menubar binary is built,
# and the npm tarball (prebuilt included via prepack) is published + attached
# to the GitHub release. Publishing needs an NPM_TOKEN repo secret; without
# one the workflow still produces the tarball as an artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # npm --provenance

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm test
      - run: npm pack # prepack builds menubar/prebuilt (universal, ad-hoc signed)
      - run: xcrun lipo -archs menubar/prebuilt/AIAcctAutopilot
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '*.tgz'
      - name: attach tarball to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' *.tgz --generate-notes || gh release upload '${{ github.ref_name }}' *.tgz
      - name: publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --provenance --access public
          else
            echo "NPM_TOKEN secret not set — skipping npm publish (tarball is attached to the release)"
          fi
