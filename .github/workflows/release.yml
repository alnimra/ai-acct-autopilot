name: release
# Tag a version (v1.x.y) → tests run, the universal menubar binary is built,
# the npm tarball is published + attached, and a notarized DMG is attached when
# Developer ID signing/notary secrets are configured. Publishing needs an
# NPM_TOKEN repo secret; without one the workflow still produces the tarball.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # npm --provenance

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm test
      - run: npm pack # prepack builds menubar/prebuilt (universal, ad-hoc signed)
      - run: xcrun lipo -archs menubar/prebuilt/AIAcctAutopilot
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '*.tgz'
      - name: attach tarball to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' *.tgz --generate-notes || gh release upload '${{ github.ref_name }}' *.tgz
      - name: import Developer ID signing assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_BASE64" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ] ||
             [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "DMG signing/notary secrets not set — skipping public DMG"
            echo "DMG_SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "DMG_SIGNING_READY=true" >> "$GITHUB_ENV"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials release-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
      - name: build notarized DMG
        if: startsWith(github.ref, 'refs/tags/') && env.DMG_SIGNING_READY == 'true'
        run: npm run build:dmg -- --notary-profile release-notary
      - name: upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/') && env.DMG_SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
      - name: attach DMG to the GitHub release
        if: startsWith(github.ref, 'refs/tags/') && env.DMG_SIGNING_READY == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload '${{ github.ref_name }}' dist/*.dmg --clobber
      - name: publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --provenance --access public
          else
            echo "NPM_TOKEN secret not set — skipping npm publish (tarball is attached to the release)"
          fi
